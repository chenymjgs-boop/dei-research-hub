name: DEI Daily Research Run

on:
  schedule:
    # Every day at 23:30 UTC = 07:30 Beijing time the next morning
    - cron: "30 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # to commit the SQLite db back
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_APP_TOKEN: ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
          FEISHU_BITABLE_TABLE_ID: ${{ secrets.FEISHU_BITABLE_TABLE_ID }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          FEISHU_DOC_FOLDER_TOKEN: ${{ secrets.FEISHU_DOC_FOLDER_TOKEN }}
          MAX_ITEMS_PER_RUN: ${{ vars.MAX_ITEMS_PER_RUN }}
          MAX_ITEMS_PER_SOURCE: ${{ vars.MAX_ITEMS_PER_SOURCE }}
          LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS }}
        run: python main.py daily

      - name: Rebuild static hub
        run: python main.py site

      - name: Commit SQLite history
        run: |
          git config user.name "dei-research-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/research.db || true
          git diff --cached --quiet || git commit -m "chore(data): daily run $(date -u +%Y-%m-%d)"
          git push || true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static hub artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
